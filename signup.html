<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up - Progress Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-dark);
            overflow: hidden;
        }

        .signup-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            z-index: 2;
        }

        .signup-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .signup-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .signup-logo i {
            font-size: 3rem;
            color: var(--primary-color);
        }

        .signup-logo h2 {
            margin-top: 1rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-light);
        }

        .form-floating > label {
            color: var(--text-muted);
        }

        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: var(--primary-color);
        }

        .btn-signup, .btn-verify {
            width: 100%;
            padding: 0.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        .login-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: var(--accent-cyan);
        }

        .email-warning {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 0.75rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        
        .email-warning i {
            color: var(--warning-color);
        }

        /* OTP Specific Styles */
        .otp-input-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25);
            outline: none;
        }

        .resend-timer-container {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .resend-otp {
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .resend-otp:hover {
            color: var(--accent-cyan);
            text-decoration: underline;
        }

        /* Step transitions */
        .step-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .step-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <!-- Animated background elements (same as hero section) -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="signup-container fade-in">
        <div class="signup-card">
            <div class="signup-logo">
                <img src="./logo_wobg.png" alt="Progress Board Logo" style="width: 80px; height: auto; margin-bottom: 0.5rem; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));">
                <h2 id="formTitle">Create an Account</h2>
            </div>
            
            <!-- Step 1: Registration Form -->
            <div id="stepRegistration" class="step-container active">
                <form id="signupForm" onsubmit="event.preventDefault(); initiateSignup();">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control glass-input" id="signupUsername" placeholder=" " required>
                        <label for="signupUsername">Username</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control glass-input" id="signupEmail" placeholder=" " required>
                        <label for="signupEmail">Email address</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control glass-input" id="signupPassword" placeholder=" " required>
                        <label for="signupPassword">Password</label>
                    </div>

                    <div class="email-warning">
                        <i class="bi bi-info-circle-fill"></i>
                        <span>Please enter a valid email address. You will need to verify it via a one-time password (OTP).</span>
                    </div>

                    <button id="signupSubmitBtn" type="submit" class="btn btn-primary btn-signup">
                        <span id="signupSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
                        Continue
                    </button>
                    
                    <div class="login-link">
                        Already have an account? <a href="login.html">Sign in</a>
                    </div>
                </form>
            </div>

            <!-- Step 2: OTP Verification Form -->
            <div id="stepVerification" class="step-container">
                <p class="text-center text-muted mb-2">We've sent a verification code to <strong id="displayEmail" class="text-light"></strong></p>
                <p class="text-center text-muted small mb-4">Please check your spam folder if you can't find it.</p>
                
                <form id="otpVerificationForm" onsubmit="event.preventDefault(); verifyOtp();">
                    <div class="otp-input-container">
                        <input type="text" maxlength="1" class="form-control otp-input" id="otp1" required>
                        <input type="text" maxlength="1" class="form-control otp-input" id="otp2" required>
                        <input type="text" maxlength="1" class="form-control otp-input" id="otp3" required>
                        <input type="text" maxlength="1" class="form-control otp-input" id="otp4" required>
                    </div>
                    
                    <div class="resend-timer-container">
                        <span id="resendTimerContainer">Resend code in <span id="resendTimer">60</span>s</span>
                        <a id="resendOtpBtn" class="resend-otp" style="display: none;" onclick="resendOtp()">Resend OTP</a>
                    </div>

                    <button id="verifyOtpBtn" type="submit" class="btn btn-success btn-verify">
                        <span id="otpVerificationSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
                        Verify Account
                    </button>

                    <div class="login-link mt-2">
                        <a href="#" onclick="showRegistrationStep(); return false;"><i class="bi bi-arrow-left me-1"></i> Change email address</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer" style="position: fixed; top: 20px; right: 20px; z-index: 1050;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const BASE_URL = 'https://progress-board-1409-20917d01.koyeb.app';
        let isSigningUp = false;
        let isVerifyingOtp = false;
        let resendOtpTimer = null;
        let resendOtpCountdown = 60;

        let pendingSignup = {
            username: '',
            email: '',
            password: ''
        };

        // UI Helpers
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            const alertDiv = document.createElement('div');
            alertDiv.id = alertId;
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            alertContainer.appendChild(alertDiv);
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    alert.classList.add('fade-out');
                    setTimeout(() => alert.remove(), 500);
                }
            }, 5000);
        }

        function toggleButtonLoading(buttonId, spinnerID, isLoading) {
            const button = document.getElementById(buttonId);
            const spinner = document.getElementById(spinnerID);
            if (button && spinner) {
                button.disabled = isLoading;
                if (isLoading) spinner.classList.remove('d-none');
                else spinner.classList.add('d-none');
            }
        }

        // Step Navigation
        function showVerificationStep() {
            document.getElementById('stepRegistration').classList.remove('active');
            document.getElementById('stepVerification').classList.add('active');
            document.getElementById('formTitle').textContent = 'Verify Email';
            document.getElementById('displayEmail').textContent = pendingSignup.email;
        }

        function showRegistrationStep() {
            document.getElementById('stepVerification').classList.remove('active');
            document.getElementById('stepRegistration').classList.add('active');
            document.getElementById('formTitle').textContent = 'Create an Account';
            clearInterval(resendOtpTimer);
        }

        // OTP Input Auto-focus Logic
        document.addEventListener('DOMContentLoaded', function () {
            const otpInputs = document.querySelectorAll('.otp-input');
            otpInputs.forEach((input, index) => {
                input.addEventListener('input', function (e) {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value && index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                });
                input.addEventListener('keydown', function (e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        otpInputs[index - 1].focus();
                    }
                });
            });
        });

        function resetOtpInputs() {
            const otpInputs = document.querySelectorAll('.otp-input');
            otpInputs.forEach(input => input.value = '');
            otpInputs[0].focus();
        }

        function startResendOtpTimer() {
            resendOtpCountdown = 60;
            document.getElementById('resendTimer').textContent = resendOtpCountdown;
            document.getElementById('resendTimerContainer').style.display = 'inline';
            document.getElementById('resendOtpBtn').style.display = 'none';

            clearInterval(resendOtpTimer);
            resendOtpTimer = setInterval(() => {
                resendOtpCountdown--;
                document.getElementById('resendTimer').textContent = resendOtpCountdown;

                if (resendOtpCountdown <= 0) {
                    clearInterval(resendOtpTimer);
                    document.getElementById('resendTimerContainer').style.display = 'none';
                    document.getElementById('resendOtpBtn').style.display = 'inline';
                }
            }, 1000);
        }

        // API Calls
        async function sendOtpEmail(email) {
            try {
                const response = await fetch(`${BASE_URL}/Auth/Send-Otp-Mail?to=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                return response.ok;
            } catch (error) {
                console.error('Error sending OTP:', error);
                return false;
            }
        }

        async function initiateSignup() {
            if (isSigningUp) return;

            pendingSignup.username = document.getElementById('signupUsername').value;
            pendingSignup.email = document.getElementById('signupEmail').value;
            pendingSignup.password = document.getElementById('signupPassword').value;

            if (!pendingSignup.username || !pendingSignup.email || !pendingSignup.password) {
                showAlert('Please fill in all fields.');
                return;
            }

            isSigningUp = true;
            toggleButtonLoading('signupSubmitBtn', 'signupSpinner', true);

            try {
                const otpSent = await sendOtpEmail(pendingSignup.email);

                if (otpSent) {
                    showVerificationStep();
                    resetOtpInputs();
                    startResendOtpTimer();
                } else {
                    showAlert('Failed to send verification code. Please check your email and try again.');
                }
            } catch (error) {
                console.error('Error during signup initiation:', error);
                showAlert('Network error occurred during signup.');
            } finally {
                isSigningUp = false;
                toggleButtonLoading('signupSubmitBtn', 'signupSpinner', false);
            }
        }

        async function resendOtp() {
            const success = await sendOtpEmail(pendingSignup.email);
            if (success) {
                showAlert('OTP has been resent to your email.', 'info');
                resetOtpInputs();
                startResendOtpTimer();
            } else {
                showAlert('Failed to resend OTP. Please try again later.');
            }
        }

        async function verifyOtp() {
            if (isVerifyingOtp) return;

            const otp1 = document.getElementById('otp1').value;
            const otp2 = document.getElementById('otp2').value;
            const otp3 = document.getElementById('otp3').value;
            const otp4 = document.getElementById('otp4').value;

            if (!otp1 || !otp2 || !otp3 || !otp4) {
                showAlert('Please enter all 4 digits of the code.');
                return;
            }

            const otpCode = parseInt(`${otp1}${otp2}${otp3}${otp4}`);
            isVerifyingOtp = true;
            toggleButtonLoading('verifyOtpBtn', 'otpVerificationSpinner', true);

            try {
                const response = await fetch(`${BASE_URL}/Auth/validate-email?receiverMail=${encodeURIComponent(pendingSignup.email)}&enteredOtp=${otpCode}`);

                if (response.ok) {
                    const result = await response.text();
                    if (result === 'true') {
                        completeSignup();
                    } else {
                        showAlert('Invalid OTP. Please try again.');
                        resetOtpInputs();
                        isVerifyingOtp = false;
                        toggleButtonLoading('verifyOtpBtn', 'otpVerificationSpinner', false);
                    }
                } else {
                    showAlert('Failed to verify OTP. Please try again.');
                    isVerifyingOtp = false;
                    toggleButtonLoading('verifyOtpBtn', 'otpVerificationSpinner', false);
                }
            } catch (error) {
                console.error('Error verifying OTP:', error);
                showAlert('Network error occurred during OTP verification.');
                isVerifyingOtp = false;
                toggleButtonLoading('verifyOtpBtn', 'otpVerificationSpinner', false);
            }
        }

        async function completeSignup() {
            try {
                // Create user account
                const res = await fetch(`${BASE_URL}/user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: pendingSignup.username,
                        email: pendingSignup.email,
                        password: pendingSignup.password
                    })
                });

                if (res.ok) {
                    // Login the user automatically
                    const loginRes = await fetch(`${BASE_URL}/Auth/obId?email=${encodeURIComponent(pendingSignup.email)}&inPass=${encodeURIComponent(pendingSignup.password)}`);

                    if (loginRes.ok) {
                        const userId = await loginRes.text();
                        localStorage.setItem('userId', userId.toString());

                        showAlert('Signup successful! Redirecting to dashboard...', 'success');

                        // Join default group silently
                        const url = `${BASE_URL}/group/add-member/${userId}/68243568bf164034f66583cd?inPsas=wlc`;
                        try {
                            await fetch(url, { method: 'PUT' });
                        } catch (e) { console.error('Silent group join failed', e); }

                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    } else {
                        showAlert('Signup successful but auto-login failed. Please sign in manually.');
                        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                    }
                } else {
                    const errorText = await res.text();
                    showAlert(`Signup failed: ${errorText || 'Email might already be in use.'}`);
                    showRegistrationStep();
                }
            } catch (error) {
                console.error('Error during account creation:', error);
                showAlert('Network error occurred while creating your account.');
                showRegistrationStep();
            } finally {
                isVerifyingOtp = false;
                toggleButtonLoading('verifyOtpBtn', 'otpVerificationSpinner', false);
            }
        }

        // Check if user is already logged in
        if (localStorage.getItem('userId')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
