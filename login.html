<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - Progress Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="./logo_wobg.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-dark);
            overflow: hidden;
            /* Prevent scrolling if animated background goes out of bounds */
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            z-index: 2;
            /* Sit above animated background */
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo i {
            font-size: 3rem;
            color: var(--primary-color);
        }

        .login-logo h2 {
            margin-top: 1rem;
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--text-light);
        }

        .form-floating>label {
            color: var(--text-muted);
        }

        .form-floating>.form-control:focus~label,
        .form-floating>.form-control:not(:placeholder-shown)~label {
            color: var(--primary-color);
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-options .form-check-label {
            color: var(--text-muted);
        }

        .login-options a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-options a:hover {
            color: var(--color-secondary);
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 1.5rem;
        }

        .signup-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: var(--color-secondary);
        }
    </style>
</head>

<body>
    <!-- Animated background elements (same as hero section) -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="login-container fade-in">
        <div class="login-card">
            <div class="login-logo">
                <!-- Logo Image -->
                <img src="./logo_wobg.png" alt="Progress Board Logo"
                    style="width: 80px; height: auto; margin-bottom: 0.5rem; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));">
                <h2>Progress Board</h2>
            </div>

            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-floating mb-4">
                    <input type="email" class="form-control glass-input" id="loginEmail" placeholder=" " required>
                    <label for="loginEmail">Email address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control glass-input" id="loginPassword" placeholder=" " required>
                    <label for="loginPassword">Password</label>
                </div>

                <div class="login-options">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" onclick="alert('Forgot password functionality coming soon!'); return false;">Forgot
                        Password?</a>
                </div>

                <button id="loginSubmitBtn" type="submit" class="btn btn-primary btn-login">
                    <span id="loginSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status"
                        aria-hidden="true"></span>
                    Sign In
                </button>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html"
                        onclick="sessionStorage.setItem('openSignup', 'true');">Sign up</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Alert Container for login errors -->
    <div id="alertContainer" style="position: fixed; top: 20px; right: 20px; z-index: 1050;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const BASE_URL = 'https://progress-board-1409-20917d01.koyeb.app';
        let isLoggingIn = false;

        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            const alertDiv = document.createElement('div');
            alertDiv.id = alertId;
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            alertContainer.appendChild(alertDiv);
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    alert.classList.add('fade-out');
                    setTimeout(() => alert.remove(), 500);
                }
            }, 5000);
        }

        function toggleButtonLoading(buttonId, spinnerID, isLoading) {
            const button = document.getElementById(buttonId);
            const spinner = document.getElementById(spinnerID);
            if (button && spinner) {
                button.disabled = isLoading;
                if (isLoading) spinner.classList.remove('d-none');
                else spinner.classList.add('d-none');
            }
        }

        async function handleLogin() {
            if (isLoggingIn) return;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAlert('Please enter both email and password.');
                return;
            }

            isLoggingIn = true;
            toggleButtonLoading('loginSubmitBtn', 'loginSpinner', true);

            try {
                const res = await fetch(`${BASE_URL}/Auth/validate?email=${encodeURIComponent(email)}&inPass=${encodeURIComponent(password)}`);
                const result = await res.text();

                if (res.ok && result === 'true') {
                    const userIdRes = await fetch(`${BASE_URL}/Auth/obId?email=${encodeURIComponent(email)}&inPass=${encodeURIComponent(password)}`);

                    if (userIdRes.ok) {
                        const userId = await userIdRes.text();
                        localStorage.setItem('userId', userId.toString());
                        // Check remember me (not implemented with cookies yet, just a placeholder UI feature)
                        window.location.href = 'dashboard.html';
                    } else {
                        showAlert('Failed to retrieve user data.');
                    }
                } else {
                    showAlert('Invalid email or password.');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error occurred. Please check your connection.');
            } finally {
                isLoggingIn = false;
                toggleButtonLoading('loginSubmitBtn', 'loginSpinner', false);
            }
        }

        // Check if user is already logged in
        if (localStorage.getItem('userId')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
