<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Progress Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="./logo_wobg.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-dark);
            overflow: hidden;
            /* Prevent scrolling if animated background goes out of bounds */
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            z-index: 2;
            /* Sit above animated background */
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo i {
            font-size: 3rem;
            color: var(--color-primary);
        }

        .login-logo h2 {
            margin-top: 1rem;
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--text-primary);
        }

        .form-floating>label {
            color: var(--text-muted);
        }

        .form-floating>.form-control:focus~label,
        .form-floating>.form-control:not(:placeholder-shown)~label {
            color: var(--color-primary);
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-options .form-check-label {
            color: var(--text-muted);
        }

        .login-options a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-options a:hover {
            color: var(--color-secondary);
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 1.5rem;
        }

        .signup-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: var(--color-secondary);
        }
    </style>
</head>

<body>
    <!-- Animated background elements (same as hero section) -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="login-container fade-in">
        <div class="login-card">
            <div class="login-logo">
                <!-- Logo Image -->
                <img src="./logo_wobg.png" alt="Progress Board Logo"
                    style="width: 80px; height: auto; margin-bottom: 0.5rem; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));">
                <h2>Progress Board</h2>
            </div>

            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-floating mb-4">
                    <input type="email" class="form-control glass-input" id="loginEmail" placeholder=" " required>
                    <label for="loginEmail">Email address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control glass-input" id="loginPassword" placeholder=" " required>
                    <label for="loginPassword">Password</label>
                </div>

                <div class="login-options">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
                </div>

                <button id="loginSubmitBtn" type="submit" class="btn btn-primary btn-login">
                    <span id="loginSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status"
                        aria-hidden="true"></span>
                    Sign In
                </button>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html"
                        onclick="sessionStorage.setItem('openSignup', 'true');">Sign up</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-0"
                style="background: var(--bg-dark); backdrop-filter: blur(12px); border: 1px solid var(--glass-border) !important; color: white;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" id="forgotPasswordModalLabel"><i class="bi bi-question-circle me-2"
                            style="color: var(--color-primary);"></i>Reset Password</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Step 1: Email -->
                    <div id="forgotStep1">
                        <p class="small text-secondary mb-4">Enter your email address and we'll send you an OTP to reset
                            your password.</p>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control glass-input" id="forgotEmail" placeholder=" "
                                required
                                style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white;">
                            <label for="forgotEmail" style="color: var(--text-muted);">Email address</label>
                        </div>
                        <button type="button" class="btn btn-primary w-100" id="sendOtpBtn" onclick="requestResetOtp()">
                            <span id="otpSpinner" class="spinner-border spinner-border-sm d-none me-2"
                                role="status"></span>
                            Send OTP
                        </button>
                    </div>

                    <!-- Step 2: OTP + New Password -->
                    <div id="forgotStep2" class="d-none">
                        <p class="small text-secondary mb-4">We've sent an OTP to your email. Enter it below along with
                            your new password.</p>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control glass-input" id="forgotOtp" placeholder=" "
                                required>
                            <label for="forgotOtp" style="color: var(--text-muted);">OTP Code</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control glass-input" id="forgotNewPass" placeholder=" "
                                required>
                            <label for="forgotNewPass" style="color: var(--text-muted);">New Password</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control glass-input" id="forgotConfirmPass"
                                placeholder=" " required>
                            <label for="forgotConfirmPass" style="color: var(--text-muted);">Confirm New
                                Password</label>
                        </div>
                        <button type="button" class="btn btn-primary w-100" id="resetBtn"
                            onclick="handlePasswordReset()">
                            <span id="resetSpinner" class="spinner-border spinner-border-sm d-none me-2"
                                role="status"></span>
                            Reset Password
                        </button>
                        <button type="button" class="btn btn-link btn-sm w-100 mt-2 text-secondary text-decoration-none"
                            onclick="toggleForgotStep(1)">Back</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container for login errors -->
    <div id="alertContainer" style="position: fixed; top: 20px; right: 20px; z-index: 1050;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const BASE_URL = 'https://progress-board-1409-20917d01.koyeb.app';
        //const BASE_URL = 'http://localhost:8081';
        let isLoggingIn = false;

        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            const alertDiv = document.createElement('div');
            alertDiv.id = alertId;
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';

            // Fix XSS vulnerability: escape message text safely
            const msgSpan = document.createElement('span');
            msgSpan.textContent = message;

            alertDiv.innerHTML = `
                ${msgSpan.outerHTML}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            alertContainer.appendChild(alertDiv);
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    alert.classList.add('fade-out');
                    setTimeout(() => alert.remove(), 500);
                }
            }, 5000);
        }

        function toggleButtonLoading(buttonId, spinnerID, isLoading) {
            const button = document.getElementById(buttonId);
            const spinner = document.getElementById(spinnerID);
            if (button && spinner) {
                button.disabled = isLoading;
                if (isLoading) spinner.classList.remove('d-none');
                else spinner.classList.add('d-none');
            }
        }

        async function handleLogin() {
            if (isLoggingIn) return;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAlert('Please enter both email and password.');
                return;
            }

            isLoggingIn = true;
            toggleButtonLoading('loginSubmitBtn', 'loginSpinner', true);

            try {
                const res = await fetch(`${BASE_URL}/Auth/validate?email=${encodeURIComponent(email)}&inPass=${encodeURIComponent(password)}`);
                const result = await res.text();

                if (res.ok && result === 'true') {
                    const userIdRes = await fetch(`${BASE_URL}/Auth/obId?email=${encodeURIComponent(email)}&inPass=${encodeURIComponent(password)}`);

                    if (userIdRes.ok) {
                        const userId = await userIdRes.text();
                        localStorage.setItem('userId', userId.toString());
                        // Check remember me (not implemented with cookies yet, just a placeholder UI feature)
                        window.location.href = 'dashboard.html';
                    } else {
                        showAlert('Failed to retrieve user data.');
                    }
                } else {
                    showAlert('Invalid email or password.');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error occurred. Please check your connection.');
            } finally {
                isLoggingIn = false;
                toggleButtonLoading('loginSubmitBtn', 'loginSpinner', false);
            }
        }

        function toggleForgotStep(step) {
            document.getElementById('forgotStep1').classList.add('d-none');
            document.getElementById('forgotStep2').classList.add('d-none');
            document.getElementById(`forgotStep${step}`).classList.remove('d-none');
        }

        async function requestResetOtp() {
            const email = document.getElementById('forgotEmail').value;
            if (!email) { showAlert('Please enter your email address.', 'warning'); return; }

            toggleButtonLoading('sendOtpBtn', 'otpSpinner', true);

            try {
                const res = await fetch(`${BASE_URL}/Auth/Send-Otp-Mail?to=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                if (res.ok) {
                    showAlert('OTP sent to your email!', 'success');
                    toggleForgotStep(2);
                } else {
                    showAlert('Failed to send OTP. Please check your email.', 'danger');
                }
            } catch (err) {
                console.error(err);
                showAlert('Network error occurred.', 'danger');
            } finally {
                toggleButtonLoading('sendOtpBtn', 'otpSpinner', false);
            }
        }

        async function handlePasswordReset() {
            const email = document.getElementById('forgotEmail').value;
            const otp = document.getElementById('forgotOtp').value;
            const newPass = document.getElementById('forgotNewPass').value;
            const confirmPass = document.getElementById('forgotConfirmPass').value;

            if (!otp || !newPass || !confirmPass) { showAlert('Please fill all fields.', 'warning'); return; }
            if (newPass !== confirmPass) { showAlert('Passwords do not match.', 'warning'); return; }

            toggleButtonLoading('resetBtn', 'resetSpinner', true);

            try {
                const res = await fetch(`${BASE_URL}/Auth/reset-password?email=${encodeURIComponent(email)}&otp=${otp}&newPass=${encodeURIComponent(newPass)}`, {
                    method: 'POST'
                });
                if (res.ok) {
                    const result = await res.text();
                    if (result === 'true') {
                        showAlert('Password reset successfully! You can now log in.', 'success');
                        const modal = bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal'));
                        modal.hide();
                    } else {
                        showAlert('Invalid OTP or email. Please try again.', 'danger');
                    }
                } else {
                    showAlert('Failed to reset password.', 'danger');
                }
            } catch (err) {
                console.error(err);
                showAlert('Network error occurred.', 'danger');
            } finally {
                toggleButtonLoading('resetBtn', 'resetSpinner', false);
            }
        }

        // Check if user is already logged in
        if (localStorage.getItem('userId')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
