<!DOCTYPE html>
<html lang="en">

<head>
    <!-- v2 -->
    <meta charset="UTF-8">
    <title>Group Details - Progress Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="pageLoader" class="loading-overlay">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-white">Loading Progress Board...</p>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg" id="ftco-navbar">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <img src="logo_wobg.png" alt="Progress Board Logo" style="height: 36px; vertical-align: middle;">
                Progress Board
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button id="settingsBtn" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-gear"></i> Settings
                </button>
                <button class="btn btn-outline-light btn-sm" onclick="handleLogout()">Logout</button>
            </div>
        </div>
    </nav>
    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="settingsModalLabel">Group Settings</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Group ID:</strong> <span id="modalGroupId">Loading...</span></p>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-danger" id="leaveGroupBtn">Leave Group</button>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


    <div class="container py-5 mt-3">
        <h2 class="mb-4 text-light">Daily Leaderboard</h2>
        <div class="main-content">
            <div class="leaderboard position-relative">
                <h4>Leaderboard</h4>
                <ul id="leaderboardList" class="list-group mb-3"></ul>
                <div id="leaderboardLoading" class="loading-overlay d-none">
                    <div class="spinner-border text-light" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
            <div class="task-sidebar">
                <h5>Your Tasks</h5>
                <div id="currentDayInfo" class="mb-3"></div>
                <div id="taskList"></div>

                <div class="action-buttons">
                    <button id="addDayBtn" class="btn btn-primary">
                        <span class="button-text">Add Day</span>
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                    <button id="addTaskBtn" class="btn btn-success" disabled>
                        <span class="button-text">Add Task</span>
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                </div>

                <form id="taskForm" class="d-none">
                    <div class="input-group mb-3">
                        <input type="text" id="taskInput" class="form-control" placeholder="Enter task title"
                            required />
                        <div class="input-group-text bg-dark text-light border-secondary" title="Mark as Private">
                            <input class="form-check-input mt-0 me-1" type="checkbox" id="taskPrivateToggle"
                                aria-label="Private Task">
                            <i class="bi bi-lock-fill"></i>
                        </div>
                        <button type="button" id="suggestAiBtn" class="btn btn-info text-white"
                            onclick="handleAiSuggestion()">
                            <span class="button-text">✨ AI Suggest</span>
                            <span class="spinner-border spinner-border-sm d-none" role="status"
                                aria-hidden="true"></span>
                        </button>
                        <button type="submit" class="btn btn-success">
                            <span class="button-text">Save</span>
                            <span class="spinner-border spinner-border-sm d-none" role="status"
                                aria-hidden="true"></span>
                        </button>
                    </div>
                    <!-- AI suggestion preview container -->
                    <div id="aiSuggestionPreview" class="d-none mt-2 p-3 border rounded bg-dark border-secondary">
                        <h6 class="text-info d-flex justify-content-between align-items-center mb-0">
                            AI Suggested Plan
                            <span id="aiLevelBadge" class="badge"></span>
                        </h6>
                        <ul id="aiSubtaskList" class="list-group list-group-flush mb-3 mt-2"></ul>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-sm btn-success w-100"
                                onclick="acceptAiSuggestion()">Accept
                                Plan</button>
                            <button type="button" class="btn btn-sm btn-outline-light w-100"
                                onclick="discardAiSuggestion()">Discard</button>
                        </div>
                    </div>
                </form>

                <div id="tasksLoading" class="loading-overlay d-none">
                    <div class="spinner-border text-light" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>

            <!-- Activity Feed Inside Main Content -->
            <div class="activity-feed glass-card p-4">
                <h5 class="border-bottom pb-3 mb-3"><i class="fa-solid fa-rss me-2 text-primary"></i>Activity Feed</h5>
                <div id="activityList" class="activity-list" style="max-height: 500px; overflow-y: auto;">
                    <div class="text-muted small">Loading activity...</div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="userTasksModal" tabindex="-1" aria-labelledby="userTasksModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content task-modal-content">
                <div class="modal-header task-modal-header">
                    <h5 class="modal-title" id="userTasksModalLabel">User Tasks</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="userTasksContainer">
                        <div class="spinner-border text-light" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer task-modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        const TASK_BASE = 'https://progress-board-1409-20917d01.koyeb.app/task';
        const GROUP_BASE = 'https://progress-board-1409-20917d01.koyeb.app/group';
        const ACTIVITY_BASE = 'https://progress-board-1409-20917d01.koyeb.app/activity';
        //const TASK_BASE = 'http://localhost:8081/task';
        //const GROUP_BASE = 'http://localhost:8081/group';
        //const ACTIVITY_BASE = 'http://localhost:8081/activity';
        const userId = localStorage.getItem('userId');

        // Track current day
        let currentDay = null;

        function getLocalDateString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Request throttling flags
        const requestFlags = {
            loadingTasks: false,
            addingDay: false,
            addingTask: false,
            updatingTask: false,
            loadingLeaderboard: false,
            leavingGroup: false
        };

        function handleLogout() {
            // Only clear auth-related data, not task data
            localStorage.removeItem('userId');
            localStorage.removeItem('userName');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('jwtToken');
            // Also clear the current day data to force reload on next login
            localStorage.removeItem('currentDay');

            window.location.href = 'index.html';
        }

        // Helper function to show loading state on a button
        function setButtonLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            const buttonText = button.querySelector('.button-text');
            const spinner = button.querySelector('.spinner-border');

            if (isLoading) {
                button.disabled = true;
                button.classList.add('btn-loading');
                buttonText.classList.add('d-none');
                spinner.classList.remove('d-none');
            } else {
                button.disabled = false;
                button.classList.remove('btn-loading');
                buttonText.classList.remove('d-none');
                spinner.classList.add('d-none');
            }
        }

        // Helper function to show/hide section loading overlay
        function setSectionLoading(sectionId, isLoading) {
            const loadingOverlay = document.getElementById(`${sectionId}Loading`);
            if (isLoading) {
                loadingOverlay.classList.remove('d-none');
            } else {
                loadingOverlay.classList.add('d-none');
            }
        }

        async function loadGroups() {
            const res = await fetch(`${GROUP_BASE}/get-user-groups/${userId}`);
            const groups = await res.json();
            const container = document.querySelector('.group-container');
            if (container) {
                container.innerHTML = '';
                groups.forEach(g => {
                    const box = document.createElement('div');
                    box.className = 'group-box';
                    box.innerHTML = `<h5>${g.name}</h5>`;
                    box.onclick = () => window.location.href = `group-details.html?id=${g.id.timestamp}`;
                    container.appendChild(box);
                });
            }
        }

        async function checkIfTodayExists() {
            try {
                const today = getLocalDateString();
                const convertedUserId = convertToObjectId(userId);
                const response = await fetch(`${TASK_BASE}/is-today-present/${convertedUserId}?date=${today}`);

                if (!response.ok) {
                    throw new Error('Failed to check if today exists: ' + response.status);
                }

                const data = await response.json();
                const addDayBtn = document.getElementById('addDayBtn');
                const addTaskBtn = document.getElementById('addTaskBtn');

                if (data === true) {
                    addDayBtn.classList.add('d-none');
                    addTaskBtn.disabled = false;
                    addTaskBtn.classList.remove('d-none');
                } else {
                    addDayBtn.classList.remove('d-none');
                    addTaskBtn.classList.add('d-none');
                }

                return data;
            } catch (error) {
                console.error("Error checking if today exists:", error);
                // Keep the Add Day button visible in case of error
                document.getElementById('addDayBtn').classList.remove('d-none');
                document.getElementById('addTaskBtn').classList.add('d-none');
                return false;
            }
        }

        async function loadTasks() {
            // Check if we're already loading tasks to prevent multiple calls
            if (requestFlags.loadingTasks) return;

            try {
                requestFlags.loadingTasks = true;
                setSectionLoading('tasks', true);

                // First check if today exists to update the Add Day button visibility
                const todayExists = await checkIfTodayExists();

                // Always fetch from server to ensure fresh data on refresh
                const today = getLocalDateString();
                const convertedUserId = convertToObjectId(userId);
                const res = await fetch(`${TASK_BASE}/get-user-tasks/${convertedUserId}?date=${today}`);

                if (res.ok) {
                    const text = await res.text();
                    if (text && text.trim() !== "") {
                        const data = JSON.parse(text);
                        currentDay = data;

                        localStorage.setItem('currentDay', JSON.stringify(currentDay));
                        renderCurrentDay();
                        renderTasks(currentDay.tasks || []);
                        document.getElementById('addTaskBtn').disabled = false;
                    } else {
                        currentDay = null;
                        localStorage.removeItem('currentDay');
                        document.getElementById('currentDayInfo').innerHTML =
                            '<div class="alert alert-info">No days added yet. Click "Add Day" to get started.</div>';
                        document.getElementById('taskList').innerHTML = '';
                        document.getElementById('addTaskBtn').disabled = true;
                    }
                } else {
                    throw new Error("Failed to load tasks");
                }
            } catch (error) {
                console.error("Error loading tasks:", error);
                document.getElementById('currentDayInfo').innerHTML =
                    '<div class="alert alert-danger">Failed to load tasks. Please try again.</div>';
            } finally {
                setSectionLoading('tasks', false);
                requestFlags.loadingTasks = false;
            }
        }

        function renderCurrentDay() {
            if (!currentDay) return;

            const dayInfo = document.getElementById('currentDayInfo');

            let totalTaskProgress = 0;
            const tasks = currentDay.tasks || [];

            tasks.forEach(task => {
                if (task.subTasks && task.subTasks.length > 0) {
                    const completedSub = task.subTasks.filter(s => s.completed).length;
                    totalTaskProgress += (completedSub / task.subTasks.length);
                } else {
                    totalTaskProgress += task.completed ? 1 : 0;
                }
            });

            const totalTasks = tasks.length;
            const progress = totalTasks > 0 ? Math.round((totalTaskProgress / totalTasks) * 100) : 0;

            dayInfo.innerHTML = `
            <div class="day-header">
                <div class="day-date">Date: ${currentDay.dateFor}</div>
                <div class="day-progress">Progress: ${progress}%</div>
            </div>
        `;
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            if (!tasks || tasks.length === 0) {
                list.innerHTML = '<div class="alert alert-light">No tasks added for this day yet.</div>';
                return;
            }

            tasks.forEach((task, taskIndex) => {
                const item = document.createElement('div');
                item.className = 'task-item mb-2';

                const mainTaskRow = document.createElement('div');
                mainTaskRow.className = 'd-flex align-items-center';

                // Checkbox
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'form-check-input me-2';
                checkbox.checked = task.completed;
                // If has subtasks, checkbox state is visual or toggles all
                checkbox.onchange = () => updateTaskStatus(task);

                // Task label
                const label = document.createElement('span');
                label.textContent = task.title;
                label.className = 'flex-grow-1';
                if (task.completed) label.classList.add('completed-task');

                if (task.level) {
                    const badge = document.createElement('span');
                    badge.textContent = task.level;
                    badge.className = 'badge ms-2 ' +
                        (task.level.toLowerCase() === 'easy' ? 'bg-success' :
                            task.level.toLowerCase() === 'medium' ? 'bg-warning text-dark' :
                                task.level.toLowerCase() === 'hard' ? 'bg-danger' : 'bg-secondary');
                    badge.style.fontSize = '0.7em';
                    label.appendChild(badge);
                }

                // Actions Container
                const actions = document.createElement('div');
                actions.className = 'task-actions';

                // Add Subtask button
                const addSubBtn = document.createElement('button');
                addSubBtn.className = 'btn btn-sm btn-outline-primary p-1 px-2';
                addSubBtn.innerHTML = '<i class="bi bi-plus-circle"></i>';
                addSubBtn.title = 'Add Subtask';
                addSubBtn.onclick = () => addSubTask(taskIndex);

                // Edit button
                const editBtn = document.createElement('button');
                editBtn.className = 'btn btn-sm btn-outline-warning p-1 px-2';
                editBtn.innerHTML = '<i class="bi bi-pencil"></i>';
                editBtn.onclick = () => editTask(task, taskIndex);

                // Delete Task Button
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn btn-sm btn-outline-danger p-1 px-2';
                deleteBtn.innerHTML = '<i class="bi bi-trash"></i>';
                deleteBtn.onclick = () => deleteTask(taskIndex);

                actions.append(addSubBtn, editBtn, deleteBtn);
                mainTaskRow.append(checkbox, label, actions);
                item.appendChild(mainTaskRow);

                // Render Subtasks
                if (task.subTasks && task.subTasks.length > 0) {
                    const subList = document.createElement('div');
                    subList.className = 'subtask-list';

                    task.subTasks.forEach((sub, subIndex) => {
                        const subItem = document.createElement('div');
                        subItem.className = 'subtask-item';

                        const subCheckbox = document.createElement('input');
                        subCheckbox.type = 'checkbox';
                        subCheckbox.className = 'form-check-input me-2';
                        subCheckbox.checked = sub.completed;
                        subCheckbox.onchange = () => toggleSubTask(taskIndex, subIndex);

                        const subLabel = document.createElement('span');
                        subLabel.textContent = sub.title;
                        subLabel.className = 'flex-grow-1';
                        if (sub.completed) subLabel.classList.add('completed-task');

                        const subDeleteBtn = document.createElement('button');
                        subDeleteBtn.className = 'btn btn-sm text-danger p-0 ms-2';
                        subDeleteBtn.innerHTML = '<i class="bi bi-x"></i>';
                        subDeleteBtn.onclick = () => deleteSubTask(taskIndex, subIndex);

                        subItem.append(subCheckbox, subLabel, subDeleteBtn);
                        subList.appendChild(subItem);
                    });
                    item.appendChild(subList);
                }

                list.appendChild(item);
            });
        }
        async function addSubTask(taskIndex) {
            const title = prompt("Enter subtask title:");
            if (!title || !title.trim()) return;

            if (!currentDay.tasks[taskIndex].subTasks) {
                currentDay.tasks[taskIndex].subTasks = [];
            }

            currentDay.tasks[taskIndex].subTasks.push({
                title: title.trim(),
                completed: false
            });

            await saveAllTasks();
        }

        async function toggleSubTask(taskIndex, subIndex) {
            const sub = currentDay.tasks[taskIndex].subTasks[subIndex];
            sub.completed = !sub.completed;

            // Auto-update parent task completion if all subtasks are done
            const allDone = currentDay.tasks[taskIndex].subTasks.every(s => s.completed);
            currentDay.tasks[taskIndex].completed = allDone;

            await saveAllTasks();
        }

        async function deleteSubTask(taskIndex, subIndex) {
            if (!confirm("Delete this subtask?")) return;
            currentDay.tasks[taskIndex].subTasks.splice(subIndex, 1);
            await saveAllTasks();
        }

        async function deleteTask(taskIndex) {
            if (!confirm("Delete this task and all its subtasks?")) return;
            currentDay.tasks.splice(taskIndex, 1);
            await saveAllTasks();
        }

        async function saveAllTasks() {
            if (requestFlags.updatingTask || !currentDay) return;

            try {
                requestFlags.updatingTask = true;
                setSectionLoading('tasks', true);

                // Ensure dateFor is present for backend matching
                if (!currentDay.dateFor) {
                    currentDay.dateFor = getLocalDateString();
                }

                const convertedUserId = convertToObjectId(userId);

                // Recalculate progress for UI (though backend does it too)
                let totalProgress = 0;
                const tasks = currentDay.tasks || [];
                tasks.forEach(task => {
                    if (task.subTasks && task.subTasks.length > 0) {
                        const completedSub = task.subTasks.filter(s => s.completed).length;
                        totalProgress += (completedSub / task.subTasks.length);
                    } else {
                        totalProgress += task.completed ? 1 : 0;
                    }
                });
                currentDay.progress = tasks.length > 0 ? (totalProgress / tasks.length) * 100 : 0;

                const response = await fetch(`${TASK_BASE}/update-user-tasks/${convertedUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentDay)
                });

                if (!response.ok) throw new Error('Failed to save tasks');

                localStorage.setItem('currentDay', JSON.stringify(currentDay));
                renderCurrentDay();
                renderTasks(currentDay.tasks);
                loadLeaderboardData();
            } catch (error) {
                console.error("Error saving tasks:", error);
                alert("Failed to save changes.");
            } finally {
                setSectionLoading('tasks', false);
                requestFlags.updatingTask = false;
            }
        }

        async function editTask(task, index) {
            const newTitle = prompt("Edit task title:", task.title);
            if (newTitle === null || newTitle.trim() === "") return;

            task.title = newTitle.trim();
            await saveAllTasks();
        }

        async function updateTaskStatus(task) {
            const taskIndex = currentDay.tasks.findIndex(t => t.title === task.title);
            if (taskIndex === -1) return;

            const isCompleted = !currentDay.tasks[taskIndex].completed;
            currentDay.tasks[taskIndex].completed = isCompleted;

            // If it has subtasks, toggle them all
            if (currentDay.tasks[taskIndex].subTasks && currentDay.tasks[taskIndex].subTasks.length > 0) {
                currentDay.tasks[taskIndex].subTasks.forEach(s => s.completed = isCompleted);
            }

            await saveAllTasks();
        }

        async function addDay() {
            // Check if we're already adding a day to prevent multiple calls
            if (requestFlags.addingDay) return;

            try {
                requestFlags.addingDay = true;
                setButtonLoading('addDayBtn', true);

                const today = getLocalDateString();
                const newDay = {
                    userId: userId,
                    dateFor: today,
                    tasks: [],
                    progress: 0
                };

                const convertedUserId = convertToObjectId(userId);
                const response = await fetch(`${TASK_BASE}/add-task/${convertedUserId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newDay)
                });

                if (response.ok) {
                    const data = await response.json();
                    currentDay = data;

                    // Save to local storage
                    localStorage.setItem('currentDay', JSON.stringify(currentDay));

                    renderCurrentDay();
                    renderTasks([]);
                    document.getElementById('addTaskBtn').disabled = false;

                    // Hide the Add Day button since today's day has been added
                    document.getElementById('addDayBtn').classList.add('d-none');
                    // Show the Add Task button
                    document.getElementById('addTaskBtn').classList.remove('d-none');
                } else {
                    alert("Failed to add new day. Please try again.");
                }
            } catch (error) {
                console.error("Error adding day:", error);
                alert("Failed to add new day. Please try again.");
            } finally {
                setButtonLoading('addDayBtn', false);
                requestFlags.addingDay = false;
            }
        }

        async function addTask(taskTitle, level = null, subTasks = [], isPrivate = false) {
            if (!currentDay || requestFlags.addingTask) return;

            try {
                requestFlags.addingTask = true;
                const taskFormSubmitBtn = document.querySelector('#taskForm button[type="submit"]');
                const buttonText = taskFormSubmitBtn.querySelector('.button-text');

                // Create new task with weights if provided
                const newTask = {
                    title: taskTitle,
                    completed: false,
                    level: level,
                    isPrivate: isPrivate,
                    subTasks: subTasks.map(sub => {
                        if (typeof sub === 'string') {
                            return { title: sub, completed: false, weight: 0 };
                        }
                        return { title: sub.title, completed: false, weight: sub.weight || 0 };
                    })
                };

                // Add task to current day
                if (!currentDay.tasks) {
                    currentDay.tasks = [];
                }

                currentDay.tasks.push(newTask);

                // Update progress
                const completedTasks = currentDay.tasks.filter(t => t.completed).length;
                const totalTasks = currentDay.tasks.length;
                currentDay.progress = totalTasks > 0 ? (completedTasks / totalTasks) * 100 : 0;

                const convertedUserId = convertToObjectId(userId);
                const response = await fetch(`${TASK_BASE}/update-user-tasks/${convertedUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentDay)
                });

                if (response.ok) {
                    // Get updated data from server to ensure consistency
                    const updatedResponse = await fetch(`${TASK_BASE}/get-user-tasks/${convertedUserId}`);

                    if (updatedResponse.ok) {
                        const text = await updatedResponse.text();
                        if (text && text.trim() !== "") {
                            const data = JSON.parse(text);
                            currentDay = data;
                            localStorage.setItem('currentDay', JSON.stringify(currentDay));
                        }
                    }

                    // Hide form and update UI
                    document.getElementById('taskForm').classList.add('d-none');
                    document.getElementById('addTaskBtn').querySelector('.button-text').textContent = 'Add Task';
                    renderCurrentDay();
                    renderTasks(currentDay.tasks);
                    loadLeaderboardData();
                } else {
                    throw new Error('Failed to add task: ' + response.status);
                }
            } catch (error) {
                console.error("Failed to add task:", error);
                alert("Failed to add task: " + error.stack);

                // On error, reload from server to ensure we're in sync
                localStorage.removeItem('currentDay');
                loadTasks();
            } finally {
                // Reset loading state
                requestFlags.addingTask = false;
            }
        }

        // Helper function to convert userId to ObjectId-like format
        function convertToObjectId(userId) {
            if (userId.length === 24 && /^[a-f0-9]{24}$/i.test(userId)) {
                return userId;
            }
            return userId.padEnd(24, '0').substring(0, 24);
        }

        // Event listeners
        document.getElementById('addDayBtn').addEventListener('click', () => {
            addDay();
        });

        document.getElementById('addTaskBtn').addEventListener('click', () => {
            const taskForm = document.getElementById('taskForm');
            if (taskForm.classList.contains('d-none')) {
                taskForm.classList.remove('d-none');
                document.getElementById('addTaskBtn').querySelector('.button-text').textContent = 'Cancel';
            } else {
                taskForm.classList.add('d-none');
                document.getElementById('addTaskBtn').querySelector('.button-text').textContent = 'Add Task';
            }
        });

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const taskInput = document.getElementById('taskInput');
            const taskTitle = taskInput.value.trim();
            const isPrivate = document.getElementById('taskPrivateToggle').checked;

            if (taskTitle) {
                const submitBtn = document.querySelector('#taskForm button[type="submit"]');
                const btnText = submitBtn.querySelector('.button-text');
                const spinner = submitBtn.querySelector('.spinner-border');

                submitBtn.disabled = true;
                btnText.classList.add('d-none');
                spinner.classList.remove('d-none');
                taskInput.disabled = true;

                let predictedLevel = 'Medium';
                try {
                    const response = await fetch(`${TASK_BASE}/suggest-ai`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: taskTitle })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        predictedLevel = data.level || 'Medium';
                    }
                } catch (error) {
                    console.error("Failed to fetch difficulty automatically", error);
                } finally {
                    submitBtn.disabled = false;
                    btnText.classList.remove('d-none');
                    spinner.classList.add('d-none');
                    taskInput.disabled = false;
                }

                discardAiSuggestion();
                addTask(taskTitle, predictedLevel, [], isPrivate);
                taskInput.value = '';
                document.getElementById('taskPrivateToggle').checked = false;
            }
        });

        let currentAiSuggestion = null;

        async function handleAiSuggestion() {
            const taskInput = document.getElementById('taskInput');
            const taskTitle = taskInput.value.trim();
            if (!taskTitle) {
                alert('Please enter a task title first!');
                return;
            }

            const aiBtn = document.getElementById('suggestAiBtn');
            const btnText = aiBtn.querySelector('.button-text');
            const spinner = aiBtn.querySelector('.spinner-border');

            aiBtn.disabled = true;
            btnText.classList.add('d-none');
            spinner.classList.remove('d-none');

            try {
                const response = await fetch(`${TASK_BASE}/suggest-ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: taskTitle })
                });

                if (!response.ok) throw new Error('Failed to get suggestions');

                const data = await response.json();
                currentAiSuggestion = data;

                // Show preview
                document.getElementById('aiSuggestionPreview').classList.remove('d-none');

                const badge = document.getElementById('aiLevelBadge');
                badge.textContent = data.level;
                badge.className = 'badge';
                if (data.level === 'Easy') badge.classList.add('bg-success');
                else if (data.level === 'Medium') badge.classList.add('bg-warning', 'text-dark');
                else if (data.level === 'Hard') badge.classList.add('bg-danger');
                else badge.classList.add('bg-secondary');

                const subList = document.getElementById('aiSubtaskList');
                subList.innerHTML = '';
                if (data.subTasks && data.subTasks.length > 0) {
                    data.subTasks.forEach(sub => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item bg-dark text-light border-secondary py-1 px-2 mb-1 rounded d-flex justify-content-between';
                        li.style.fontSize = '0.9rem';

                        const titleSpan = document.createElement('span');
                        titleSpan.textContent = sub.title;

                        const weightSpan = document.createElement('span');
                        weightSpan.className = 'text-muted';
                        weightSpan.textContent = `(W: ${Math.round(sub.weight * 100)}%)`;
                        weightSpan.style.fontSize = '0.8rem';

                        li.append(titleSpan, weightSpan);
                        subList.appendChild(li);
                    });
                }
            } catch (error) {
                console.error('AI Suggestion error:', error);
                alert('Could not get AI suggestions. Please try again.');
            } finally {
                aiBtn.disabled = false;
                btnText.classList.remove('d-none');
                spinner.classList.add('d-none');
            }
        }

        function acceptAiSuggestion() {
            const taskInput = document.getElementById('taskInput');
            const taskTitle = taskInput.value.trim();
            const isPrivate = document.getElementById('taskPrivateToggle').checked;
            if (taskTitle && currentAiSuggestion) {
                addTask(taskTitle, currentAiSuggestion.level, currentAiSuggestion.subTasks || [], isPrivate);
                discardAiSuggestion();
                taskInput.value = '';
                document.getElementById('taskPrivateToggle').checked = false;
            }
        }

        function discardAiSuggestion() {
            const preview = document.getElementById('aiSuggestionPreview');
            if (preview) preview.classList.add('d-none');
            currentAiSuggestion = null;
        }

        async function loadLeaderboardData() {
            // Check if we're already loading leaderboard data to prevent multiple calls
            if (requestFlags.loadingLeaderboard) return;

            try {
                requestFlags.loadingLeaderboard = true;
                setSectionLoading('leaderboard', true);

                const urlParams = new URLSearchParams(window.location.search);
                const groupId = urlParams.get("id");

                if (!groupId) {
                    console.error("No group ID found in URL");
                    document.getElementById('leaderboardList').innerHTML =
                        '<div class="alert alert-danger">No group ID specified in URL.</div>';
                    return;
                }

                localStorage.setItem("groupId", groupId);
                const response = await fetch(`${GROUP_BASE}/getUsers_and_progress?groupId=${groupId}`);

                if (!response.ok) throw new Error(`API error: ${response.status}`);

                const groupUserData = await response.json();
                // Sort users by progress descending
                const sortedUsers = groupUserData.sort((a, b) => b.userProgress - a.userProgress);

                const leaderboardList = document.getElementById('leaderboardList');
                leaderboardList.innerHTML = '';

                if (sortedUsers.length === 0) {
                    leaderboardList.innerHTML = '<div class="alert alert-info">No users found in this group.</div>';
                    return;
                }

                // Find current user's role to determine if they can nudge
                const currentUserInfo = sortedUsers.find(u => u.userId === userId);
                const canNudge = currentUserInfo && (currentUserInfo.role === 'Owner' || currentUserInfo.role === 'Admin');

                sortedUsers.forEach((userData, index) => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item leaderboard-item p-3 mb-2';

                    let rankingIndicator = '';
                    if (index === 0) rankingIndicator = '🥇 ';
                    else if (index === 1) rankingIndicator = '🥈 ';
                    else if (index === 2) rankingIndicator = '🥉 ';

                    // Role Badge & Leader Icon
                    let roleHtml = '';
                    let leaderIcon = '';
                    if (userData.role === 'Owner') {
                        roleHtml = '<span class="badge bg-primary ms-1" style="font-size: 0.6rem;">Owner</span>';
                        leaderIcon = '<i class="fa-solid fa-crown text-warning me-1" title="Leader"></i>';
                    } else if (userData.role === 'Admin') {
                        roleHtml = '<span class="badge bg-info ms-1" style="font-size: 0.6rem;">Admin</span>';
                    }

                    // Admin Actions
                    let adminActionsHtml = '';
                    if (userData.userId !== userId) {
                        // Owner can do anything
                        if (currentUserInfo && currentUserInfo.role === 'Owner') {
                            if (userData.role === 'Member') {
                                adminActionsHtml += `<button class="btn btn-sm btn-outline-info ms-1 promote-admin-btn" data-target-id="${userData.userId}" data-target-name="${userData.userName}" title="Promote to Admin"><i class="fa-solid fa-shield-halved"></i></button>`;
                            }
                            adminActionsHtml += `<button class="btn btn-sm btn-outline-danger ms-1 remove-member-btn" data-target-id="${userData.userId}" data-target-name="${userData.userName}" title="Remove Member"><i class="fa-solid fa-user-minus"></i></button>`;
                        } else if (currentUserInfo && currentUserInfo.role === 'Admin') {
                            if (userData.role === 'Member') {
                                adminActionsHtml += `<button class="btn btn-sm btn-outline-danger ms-1 remove-member-btn" data-target-id="${userData.userId}" data-target-name="${userData.userName}" title="Remove Member"><i class="fa-solid fa-user-minus"></i></button>`;
                            }
                        }
                    }

                    // Nudge Button
                    let nudgeBtnHtml = '';
                    if (canNudge && userData.userId !== userId && userData.userProgress < 10) {
                        nudgeBtnHtml = `<button class="btn btn-sm btn-outline-warning ms-1 nudge-btn" data-target-id="${userData.userId}" data-target-name="${userData.userName}" title="Send Nudge"><i class="fa-solid fa-bell"></i></button>`;
                    }

                    const streakCount = userData.streak || 0;
                    const streakHtml = `<span class="streak-badge ms-2" title="Daily Streak: ${streakCount} days"><i class="bi bi-fire"></i> ${streakCount}</span>`;

                    li.innerHTML = `
                        <div class="leaderboard-top-row d-flex justify-content-between align-items-center mb-2">
                             <div class="d-flex align-items-center">
                                <a href="profile.html?id=${userData.userId}" class="fw-bold text-light text-decoration-none user-link">${rankingIndicator}${leaderIcon}${userData.userName || 'Anonymous'}</a>
                                ${roleHtml}
                                ${streakHtml}
                             </div>
                        </div>
                        <div class="leaderboard-actions-row d-flex flex-wrap justify-content-between align-items-center gap-2 mt-2">
                            <div class="d-flex align-items-center gap-2 flex-grow-1 mb-1" style="min-width: 120px;">
                                <div class="progress flex-grow-1" style="height: 6px; background: rgba(255,255,255,0.05); min-width: 50px;">
                                    <div class="progress-bar bg-success" role="progressbar" style="width: ${userData.userProgress}%"></div>
                                </div>
                                <span class="badge bg-primary bg-opacity-25 text-primary border border-primary border-opacity-25 rounded-pill" style="font-size: 0.7rem;">${userData.userProgress.toFixed(0)}%</span>
                            </div>
                            <div class="d-flex flex-wrap gap-1 mb-1">
                                <button class="btn btn-sm btn-outline-info view-tasks-btn p-1 px-2" data-user-id="${userData.userId}" data-user-name="${userData.userName || 'User'}"><i class="fa-solid fa-eye me-1"></i>Tasks</button>
                                ${nudgeBtnHtml}
                                ${adminActionsHtml}
                            </div>
                        </div>
                    `;
                    leaderboardList.appendChild(li);
                });

                // Add event listeners for new buttons
                document.querySelectorAll('.promote-admin-btn').forEach(btn => {
                    btn.addEventListener('click', () => promoteMember(btn.dataset.targetId, btn.dataset.targetName));
                });
                document.querySelectorAll('.remove-member-btn').forEach(btn => {
                    btn.addEventListener('click', () => removeUser(btn.dataset.targetId, btn.dataset.targetName));
                });

                // Add event listeners for Nudge buttons
                document.querySelectorAll('.nudge-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        nudgeUser(btn.dataset.targetId, btn.dataset.targetName);
                    });
                });

                // Add event listeners to the "View Tasks" buttons
                const viewTaskButtons = document.querySelectorAll('.view-tasks-btn');
                viewTaskButtons.forEach(button => {
                    button.addEventListener('click', async (event) => {
                        const specificUserId = event.target.dataset.userId;
                        const userName = event.target.dataset.userName;
                        await openTaskModal(specificUserId, userName);
                    });
                });

            } catch (error) {
                console.error("Error loading leaderboard data:", error);
                document.getElementById('leaderboardList').innerHTML =
                    '<div class="alert alert-danger">Failed to load leaderboard data. Please try again.</div>';
            } finally {
                setSectionLoading('leaderboard', false);
                requestFlags.loadingLeaderboard = false;
            }
        }

        // Function to open the modal and load user tasks
        async function openTaskModal(userId, userName) {
            // Create the modal structure dynamically if it doesn't exist
            let taskModal = document.getElementById('taskModal');
            if (!taskModal) {
                taskModal = document.createElement('div');
                taskModal.className = 'modal fade';
                taskModal.id = 'taskModal';
                taskModal.tabIndex = -1;
                taskModal.setAttribute('aria-labelledby', 'taskModalLabel');
                taskModal.setAttribute('aria-hidden', 'true');
                taskModal.innerHTML = `
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="taskModalLabel">Tasks for <span id="modal-user-name"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <ul id="userTaskList" class="list-group">
                            <li class="list-group-item">Loading tasks...</li>
                        </ul>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        `;
                document.body.appendChild(taskModal);
            }

            // Set the user's name in the modal title
            document.getElementById('modal-user-name').textContent = userName;

            // Show the modal
            const modalInstance = new bootstrap.Modal(taskModal);
            modalInstance.show();

            // Fetch and display the user's tasks
            const userTaskList = document.getElementById('userTaskList');
            userTaskList.innerHTML = '<li class="list-group-item">Loading tasks...</li>'; // Reset loading state

            try {
                console.log(userId);
                const response = await fetch(`${TASK_BASE}/get-user-tasks/${userId}`); // Modified URL
                if (!response.ok) {
                    userTaskList.innerHTML = '<li class="list-group-item text-danger">Failed to load tasks.</li>';
                    console.error("Error fetching user tasks:", response.status);
                    return;
                }
                const userTasks = await response.json();

                userTaskList.innerHTML = ''; // Clear the loading message
                console.log(userTasks);
                if (userTasks && Array.isArray(userTasks.tasks)) {
                    userTasks.tasks.forEach(task => {
                        const listItem = document.createElement('li');
                        listItem.className = 'list-group-item';

                        const mainTask = document.createElement('div');
                        mainTask.className = 'd-flex justify-content-between align-items-center';

                        const isOwnTask = userId === localStorage.getItem('userId');
                        let titleText = task.title || 'Untitled Task';

                        if (task.isPrivate && !isOwnTask) {
                            titleText = '🔒 Private Task';
                        }

                        const status = task.completed ? '✅' : '❌';

                        const titleSpan = document.createElement('span');
                        titleSpan.textContent = titleText;
                        if (task.isPrivate && isOwnTask) {
                            const lck = document.createElement('i');
                            lck.className = 'bi bi-lock-fill text-muted ms-1';
                            lck.style.fontSize = '0.8em';
                            lck.title = 'Private Task';
                            titleSpan.appendChild(lck);
                        }

                        const statusSpan = document.createElement('span');
                        statusSpan.textContent = status;

                        mainTask.appendChild(titleSpan);
                        mainTask.appendChild(statusSpan);
                        listItem.appendChild(mainTask);

                        // Show subtasks if they exist and task is either public or owner is viewing
                        if (task.subTasks && task.subTasks.length > 0 && (!task.isPrivate || isOwnTask)) {
                            const subList = document.createElement('ul');
                            subList.className = 'list-unstyled ms-4 mt-2 border-start ps-3';
                            subList.style.fontSize = '0.9rem';
                            subList.style.opacity = '0.8';

                            task.subTasks.forEach(sub => {
                                const subItem = document.createElement('li');
                                subItem.className = 'd-flex justify-content-between';
                                const subTextSpan = document.createElement('span');
                                subTextSpan.textContent = sub.title;
                                const subStatusSpan = document.createElement('span');
                                subStatusSpan.textContent = sub.completed ? '✓' : '○';
                                subItem.appendChild(subTextSpan);
                                subItem.appendChild(subStatusSpan);
                                subList.appendChild(subItem);
                            });
                            listItem.appendChild(subList);
                        }

                        userTaskList.appendChild(listItem);
                    });
                } else {
                    userTaskList.innerHTML = '<li class="list-group-item">No tasks found for this user.</li>';
                }



            } catch (error) {
                userTaskList.innerHTML = '<li class="list-group-item text-danger">Failed to load tasks.</li>';
                console.error("Error loading user tasks:", error);
            }
        }

        async function loadActivityFeed() {
            const params = new URLSearchParams(window.location.search);
            const groupId = params.get('id');
            if (!groupId) return;

            try {
                const res = await fetch(`${ACTIVITY_BASE}/group/${groupId}`);
                const activities = await res.json();
                renderActivities(activities);
            } catch (err) {
                console.error("Failed to load activity feed:", err);
            }
        }

        function renderActivities(activities) {
            const container = document.getElementById('activityList');
            if (!activities || activities.length === 0) {
                container.innerHTML = '<div class="text-white-50 small p-3">No recent activity. Be the first to start!</div>';
                return;
            }

            container.innerHTML = '';
            activities.forEach((act, index) => {
                const item = document.createElement('div');

                let typeClass = '';
                let iconClass = '';
                let iconColor = '';

                switch (act.type) {
                    case 'TASK_COMPLETE':
                        typeClass = 'type-task';
                        iconClass = 'fa-solid fa-circle-check';
                        iconColor = '#10b981';
                        break;
                    case 'DAILY_COMPLETE':
                        typeClass = 'type-daily';
                        iconClass = 'fa-solid fa-star';
                        iconColor = '#f59e0b';
                        break;
                    case 'LEVEL_UP':
                        typeClass = 'type-level';
                        iconClass = 'fa-solid fa-rocket';
                        iconColor = '#3b82f6';
                        break;
                    case 'MEMBER_JOIN':
                        typeClass = 'type-join';
                        iconClass = 'fa-solid fa-user-plus';
                        iconColor = '#8b5cf6';
                        break;
                    case 'BADGE_EARNED':
                        typeClass = 'type-badge';
                        iconClass = 'fa-solid fa-award';
                        iconColor = '#ec4899';
                        break;
                    default:
                        typeClass = '';
                        iconClass = 'fa-solid fa-bell';
                        iconColor = '#6b7280';
                }

                item.className = `activity-card ${typeClass}`;
                // Staggered animation
                item.style.animationDelay = `${index * 0.1}s`;

                const time = new Date(act.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                item.innerHTML = `
                    <div class="d-flex gap-3">
                        <div class="activity-icon" style="color: ${iconColor}; font-size: 1.1rem;">
                            <i class="${iconClass}"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="username">${act.username}</span>
                                <span class="time">${time}</span>
                            </div>
                            <div class="message">${act.message}</div>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }
        async function promoteMember(targetId, targetName) {
            if (!confirm(`Are you sure you want to promote ${targetName} to Admin?`)) return;
            const groupId = localStorage.getItem("groupId");
            try {
                const res = await fetch(`${GROUP_BASE}/promote-admin/${groupId}/${targetId}?ownerId=${userId}`, {
                    method: 'PUT'
                });
                if (res.ok) {
                    alert(`${targetName} is now an Admin!`);
                    loadLeaderboardData();
                } else alert('Failed to promote user');
            } catch (err) { console.error(err); }
        }

        async function removeUser(targetId, targetName) {
            if (!confirm(`Are you sure you want to remove ${targetName} from the group?`)) return;
            const groupId = localStorage.getItem("groupId");
            try {
                const res = await fetch(`${GROUP_BASE}/remove-member/${groupId}/${targetId}?requesterId=${userId}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    alert(`${targetName} has been removed.`);
                    loadLeaderboardData();
                } else alert('Failed to remove user');
            } catch (err) { console.error(err); }
        }

        window.addEventListener('load', () => {
            const loader = document.getElementById('pageLoader');
            loader.style.opacity = 0;
            setTimeout(() => loader.style.display = 'none', 800);
        });

        async function nudgeUser(targetId, targetName) {
            if (!confirm(`Send a nudge to ${targetName}?`)) return;

            const senderName = localStorage.getItem('userName') || 'A leader';
            const NOTIFICATION_BASE = ACTIVITY_BASE.replace('activity', 'notification');
            const notification = {
                recipientId: targetId,
                senderName: senderName,
                message: `${senderName} is encouraging you to complete your tasks for today!`,
                type: 'REMINDER'
            };

            try {
                const res = await fetch(`${NOTIFICATION_BASE}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(notification)
                });
                if (res.ok) alert(`Nudge sent to ${targetName}!`);
                else alert('Failed to send nudge');
            } catch (err) {
                console.error(err);
            }
        }

    <script>
        const CHAT_BASE = 'http://localhost:8081/chat';
        let chatPollingInterval = null;
        let lastMessageCount = 0;

        function toggleChat() {
            const chatWin = document.getElementById('chatWindow');
            const chatBadge = document.getElementById('chatBadge');

            if (chatWin.classList.contains('d-none')) {
                chatWin.classList.remove('d-none');
                chatBadge.classList.add('d-none');
                loadChatMessages(true); // Force scroll on open
                startChatPolling();
                setTimeout(() => document.getElementById('chatInput').focus(), 300);
            } else {
                chatWin.classList.add('d-none');
                stopChatPolling();
            }
        }

        async function loadChatMessages(forceScroll = false) {
            const params = new URLSearchParams(window.location.search);
            const groupId = params.get('id');
            if (!groupId) return;

            try {
                const res = await fetch(`${CHAT_BASE}/group/${groupId}`);
                const messages = await res.json();
                renderChatMessages(messages);

                if (messages.length > lastMessageCount || forceScroll) {
                    scrollToBottom();
                    lastMessageCount = messages.length;
                }
            } catch (err) {
                console.error("Chat fetch error:", err);
            }
        }

        function renderChatMessages(messages) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            if (messages.length === 0) {
                container.innerHTML = '<div class="text-center text-white-50 mt-5 small">No messages yet. Say hi! 👋</div>';
                return;
            }

            messages.forEach(msg => {
                const isMe = msg.userId === userId;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message-bubble ${isMe ? 'me' : 'others'}`;

                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                msgDiv.innerHTML = `
                    <div class="msg-sender">${isMe ? 'You' : msg.username}</div>
                    <div class="msg-text">${msg.message}</div>
                    <div class="msg-time">${time}</div>
                `;
                container.appendChild(msgDiv);
            });
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const params = new URLSearchParams(window.location.search);
            const groupId = params.get('id');
            const username = localStorage.getItem('userName') || 'Anonymous';

            input.value = '';

            try {
                const res = await fetch(`${CHAT_BASE}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, username, groupId, message })
                });

                if (res.ok) {
                    loadChatMessages(true);
                }
            } catch (err) {
                console.error("Chat send error:", err);
            }
        });

        function startChatPolling() {
            if (chatPollingInterval) clearInterval(chatPollingInterval);
            chatPollingInterval = setInterval(() => loadChatMessages(false), 3000);
        }

        function stopChatPolling() {
            if (chatPollingInterval) clearInterval(chatPollingInterval);
            chatPollingInterval = null;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>

</html>
